<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Order Dashboard</title>
<link rel="stylesheet" href="./styles/order.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="header-left">
    <h1 class="system-name">Online Orders Control Panel</h1>
    <p class="system-subtitle">Goodhope On The Go</p>
  </div>
</header>

<!-- ORDER INFO -->
<section class="order-info">
  <h2>Order Information</h2>

  <div class="order-details">
    <div class="detail-row">
      <span class="label">Order ID:</span>
      <span class="value">60067</span>
    </div>

    <div class="detail-row">
      <span class="label">Payment:</span>
      <span class="value">Waiting for Pop</span>
    </div>

    <div class="detail-row">
      <span class="label">Address:</span>
      <span class="value">Claremont</span>
    </div>

    <div class="detail-row">
      <span class="label">Missing Item:</span>
      <span class="value">Chana Dhal</span>
    </div>

    <div class="detail-row">
      <span class="label">Price:</span>
      <span class="value">R29.99</span>
    </div>

    <div class="action-row">
      <button class="action-btn">Mark as Paid</button>
      <button class="action-btn">Change  Address</button>
      <button class="action-btn cancel">Cancel Order</button>
      <button class="action-btn success">Missing item sent</button>
    </div>
  </div>
</section>

<!-- TIMELINE -->
<section class="order-timeline">
  <h2>Timeline</h2>

  <div class="timeline">
    <div class="timeline-step">
      <span class="step-label">Order Added:</span>
      <span class="step-value">24/03/2026</span>
    </div>

    <div class="timeline-step">
      <span class="step-label">Checked by Mark:</span>
      <span class="step-value">24/03/2026</span>
    </div>

    <div class="timeline-step">
      <span class="step-label">Dispatched by  Lucian:</span>
      <span class="step-value">24/03/2026</span>
    </div>

    <div class="timeline-step">
      <span class="step-label">Driver name:</span>
      <span class="step-value">Darryl</span>
    </div>
     <div class="action-buttons">
    <button class="action-btn deliver">Order Delivered</button>
     <button class="action-btn return">Order returned</button>
     </div>
  </div>
</section>

</body>
</html>
