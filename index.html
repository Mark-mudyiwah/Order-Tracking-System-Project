    <div class = "header">
         <div class="system-name-text">
          Online  Orders Control Panel
        </div>
        <div class="on-the-go-text">
          Goodhope On The Go
        </div>
       

    </div>

    <span class="add-orders-text">
        Add Orders for Today
     </span>

    <span class=" date-container js-date-container">
        
    </span>

    <div class="button-template-container">

    <div class="order-addition-template">
        <div class="order-id-container">
            <span class="temp-property-text">Order Id:</span>
            <input class="id-input js-order-id-input" type="text"
             placeholder="Enter order number"
             inputmode="numeric" 
             pattern="[0-9]{5}"
             oninput="this.value = this.value.replace(/[^0-9]/g, '')"
             required>
               <span class="error-span js-id-error-span"></span>
            </div>
        <div class="customer-details-container">
            <span class="temp-property-text">
              Address:
            </span>
             <input class="address-input js-order-address-input" type="text"
             placeholder=" Enter Customer address"
             required>
             <span class="error-span js-address-error-span "></span>
        </div>
        <div class="order-type-container">
            <span class="temp-property-text">Delivery Type:</span>
            <select class="order-type-select js-delivery-select">
              <option value="" disabled selected>Select Delivery Type</option>
             <option value="Delivery">Delivery</option>
             <option value="Collection">Collection</option>
             <option value="Early-delivery">Early Delivery</option>
             <option value="Late-delivery">Late Delivery</option>
             <option value="Early-collection">Early Collection</option>
             
           
            
           </select>
        </div>

         <div class="order-type-container">
            <span class="temp-property-text">Payment:</span>
            <select class="order-type-select js-payment-select">
              <option value="" disabled selected>Select Payment Type</option>
             <option value="Payfast"  >Paid</option>
             <option value="awaiting-payment" >Awaiting Payment</option>
           
            
           </select>
        </div>





       <!--<div class="extra-notes-container">
            <span class="temp-property-text">Note:</span>

              <input class="note-input" type="text"
              placeholder=" eg.Early delivery">
            
            
        </div>--> 

    </div>

      <div class="add-button-container">
       <button class ="add-order-button js-add-orders-button">Add Order &#43;</button>
      </div>
   
    </div>


        <span class="today-orders-heading"> Today's Orders</span>

        
    <table>
        <thead>
            <tr>
                <th class="order-id">Order Id</th>
                <th class="order-address">Address</th>
                <th class="order-date">Date Added</th>
                <th class="order-status"> Order Type</th>
                 <th class="order-status"> Payment Method</th>
            </tr>
        </thead>
        <tbody class="js-orders-container">

            
 

        </tbody>
    </table>
