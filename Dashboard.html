  <div class="orders-status-container-primary">

    <div class="order-status-container all-orders-card">
      <img src="icons/total-orders-icon.png">
      <span class=" status-count js-total-orders"></span>
      <span class="status-type-text">Total Orders</span>
      <a  href="orders.html?query=All" class="view-button">View</a>
      </div>



    <div class="order-status-container processing-orders-card">
      <img src="icons/checked-orders-icon.png">
      <span class=" status-count js-active-orders"></span>
      <span class="status-type-text">Active Orders</span>
      <a  href="orders.html?query=paidOrders" class="view-button">View</a>
    </div>

    <div class="order-status-container pickup-orders-card">
      <img src="icons/collection-orders-icon.png">
      <span class=" status-count js-collection-orders"></span>
      <span class="status-type-text">Instore Pickup</span>
    <a  href="orders.html?query=Collections" class="view-button">View</a>
    </div>

    <div class="order-status-container bank-orders-card">
      <img src="icons/bank-transfare-icon.png">
      <span class=" status-count js-unpaid-orders" >01</span>
      <span class="status-type-text ">Awaiting Payment</span>
     <a  href="orders.html?query=awaitingPayment" class="view-button">View</a>
    </div>


    <div class="order-status-container ready-orders-card">
      <img src="icons/dispatched-orders-icon.png">
      <span class=" status-count js-checked-orders"></span>
      <span class="status-type-text">Ready to Go</span>
     <a  href="orders.html?query=checked" class="view-button">View</a>
    </div>

  </div>
